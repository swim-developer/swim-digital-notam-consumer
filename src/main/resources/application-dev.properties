# =============================================================================
# SWIM DNOTAM Consumer - Development Profile
# =============================================================================
# Uses swim-validator compose.yml infrastructure (Artemis AMQPS, MariaDB)
# and root compose.yml (MongoDB, Kafka, etc.)
# DevServices are DISABLED to prevent Testcontainers from starting
# =============================================================================

# =============================================================================
# MongoDB
# =============================================================================
quarkus.mongodb.connection-string=${MONGODB_URI:mongodb://localhost:27017}

# =============================================================================
# DNOTAM Subscriptions (Hard-coded for local testing)
# =============================================================================
dnotam.subscriptions=[{"topic":"DNOTAM/v1","provider":"validator","eventScenario":["RWY.CLS"],"airportHeliport":["LPPT"],"description":"Runway closures at Lisbon"},{"topic":"DNOTAM/v1","provider":"validator","eventScenario":["OBS.NEW"],"airportHeliport":["EHAM"],"description":"Obstacles at Amsterdam"}]

# =============================================================================
# SWIM Providers (Dev - dnotam-consumer-validator-artemis AMQPS + mTLS)
# Host port 5673 -> container 5671. Certs: tools/certificates/generate-all.sh -> consumer certs/ *.jks
# Broker maps client cert DN via JAAS CertLogin (dnotam-consumer-validator-artemis login.config).
# =============================================================================
swim.providers=[{"providerId":"validator","subscriptionManager":{"url":"http://localhost:8084","tls":null,"resilience":{"connectTimeoutMs":0,"readTimeoutMs":0,"retryMaxAttempts":0,"retryDelayMs":0}},"amqpBroker":{"host":"localhost","port":5671,"sslEnabled":true,"username":"admin","password":"admin","tls":{"trustStorePath":"certs/truststore.jks","trustStorePassword":"changeit","keyStorePath":"certs/keystore.jks","keyStorePassword":"changeit"}}}]

# =============================================================================
# AMQP Broker (same broker as validator provider)
# =============================================================================
swim.amqp.host=localhost
swim.amqp.port=5671
swim.amqp.ssl.enabled=true
swim.amqp.ssl.truststore-path=certs/truststore.jks
swim.amqp.ssl.truststore-password=changeit
swim.amqp.ssl.keystore-path=certs/keystore.jks
swim.amqp.ssl.keystore-password=changeit

# =============================================================================
# Subscription Renewal (Faster intervals for dev)
# =============================================================================
swim.subscription.renewal.check-interval=2m
swim.subscription.renewal.threshold=30m

# =============================================================================
# Validation — handled by aixm-model (SwimXsdValidator), no XSD path needed
# =============================================================================

# =============================================================================
# DevServices - DISABLED (use compose.yml instead)
# =============================================================================
quarkus.devservices.enabled=false

# =============================================================================
# Kafka
# =============================================================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# =============================================================================
# Per-Subscription Heartbeat Monitor (faster check interval for dev)
# =============================================================================
swim.heartbeat.monitor.check-interval=10s


# =============================================================================
# TLS Certificate Reloader - disabled in dev (no live certs to reload)
# =============================================================================
swim.tls.reload-period=off

# =============================================================================
# OpenTelemetry - DISABLED in dev (no collector running)
# =============================================================================
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
quarkus.log.file.enabled=true
quarkus.log.file.path=target/app.log
