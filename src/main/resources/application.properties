# =============================================================================
# SWIM DNOTAM Consumer - Common Configuration (All Profiles)
# =============================================================================
# Profile-specific configs: application-{dev,test,prod}.properties
# =============================================================================

quarkus.application.name=swim-dnotam-consumer
swim.service.name=dnotam
swim.subscriptions=${dnotam.subscriptions:[]}
swim.subscriptions.command-type=com.github.swim_developer.dnotam.consumer.domain.model.command.SubscriptionCommand

# =============================================================================
# MongoDB Configuration
# =============================================================================
quarkus.mongodb.database=${MONGODB_DATABASE:swim-dnotam}
quarkus.mongodb.max-pool-size=${MONGODB_MAX_POOL_SIZE:50}
quarkus.mongodb.min-pool-size=${MONGODB_MIN_POOL_SIZE:5}
quarkus.mongodb.max-connection-idle-time=60s
quarkus.mongodb.connect-timeout=10s
quarkus.mongodb.read-timeout=60s
quarkus.mongodb.server-selection-timeout=10000
quarkus.mongodb.health.enabled=false

# =============================================================================
# SWIM Providers (Multi-Provider Support)
# =============================================================================
# Each provider has: SM REST API URL + AMQP broker config + optional mTLS certs
# Subscriptions reference providers by providerId
swim.providers=${SWIM_PROVIDERS:[{"providerId":"default","subscriptionManager":{"url":"http://localhost:8081","tls":null,"resilience":{"connectTimeoutMs":0,"readTimeoutMs":0,"retryMaxAttempts":0,"retryDelayMs":0}},"amqpBroker":{"host":"localhost","port":5672,"sslEnabled":false,"username":"admin","password":"admin","tls":null}}]}

# =============================================================================
# DNOTAM Subscriptions
# =============================================================================
dnotam.subscriptions.delete-and-recreate=${DNOTAM_DELETE_AND_RECREATE:true}
swim.subscriptions.delete-and-recreate=${DNOTAM_DELETE_AND_RECREATE:true}

# =============================================================================
# Reconciliation
# =============================================================================
reconciliation.retry.interval=${RECONCILIATION_RETRY_INTERVAL:10s}
reconciliation.retry.initial-delay=${RECONCILIATION_RETRY_INITIAL_DELAY:30s}
# Filter cache: 0 = periodic refresh off. N>0 = reload from DB every N reconciliation ticks (optional safety net).
swim.subscription.filter-cache.refresh-interval-cycles=${SWIM_FILTER_CACHE_REFRESH_CYCLES:0}

# =============================================================================
# Subscription Renewal
# =============================================================================
swim.subscription.renewal.enabled=${SWIM_RENEWAL_ENABLED:true}
swim.subscription.renewal.check-interval=${SWIM_RENEWAL_CHECK_INTERVAL:5m}
swim.subscription.renewal.threshold=${SWIM_RENEWAL_THRESHOLD:1h}
swim.subscription.renewal.retry-count=${SWIM_RENEWAL_RETRY_COUNT:3}

# =============================================================================
# Validation
# =============================================================================
swim.validation.enabled=${SWIM_VALIDATION_ENABLED:true}
swim.validation.fail-on-nullbody=${SWIM_VALIDATION_FAIL_ON_NULLBODY:false}

# =============================================================================
# Kafka Configuration (global producer tuning)
# =============================================================================
kafka.batch.size=${KAFKA_BATCH_SIZE:65536}
kafka.linger.ms=${KAFKA_LINGER_MS:5}
kafka.buffer.memory=${KAFKA_BUFFER_MEMORY:67108864}

# =============================================================================
# Kafka Outgoing Channels (Event Publishing)
# =============================================================================
mp.messaging.outgoing.out-closure.connector=smallrye-kafka
mp.messaging.outgoing.out-closure.topic=dnotam-events-closure-topic
mp.messaging.outgoing.out-closure.compression.type=lz4
mp.messaging.outgoing.out-closure.acks=1
mp.messaging.outgoing.out-closure.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-closure.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-closure.waitForWriteCompletion=false
mp.messaging.outgoing.out-closure.tracing-enabled=true

mp.messaging.outgoing.out-restriction.connector=smallrye-kafka
mp.messaging.outgoing.out-restriction.topic=dnotam-events-restriction-topic
mp.messaging.outgoing.out-restriction.compression.type=lz4
mp.messaging.outgoing.out-restriction.acks=1
mp.messaging.outgoing.out-restriction.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-restriction.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-restriction.waitForWriteCompletion=false
mp.messaging.outgoing.out-restriction.tracing-enabled=true

mp.messaging.outgoing.out-surface.connector=smallrye-kafka
mp.messaging.outgoing.out-surface.topic=dnotam-events-surface-condition-topic
mp.messaging.outgoing.out-surface.compression.type=lz4
mp.messaging.outgoing.out-surface.acks=1
mp.messaging.outgoing.out-surface.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-surface.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-surface.waitForWriteCompletion=false
mp.messaging.outgoing.out-surface.tracing-enabled=true

mp.messaging.outgoing.out-airspace.connector=smallrye-kafka
mp.messaging.outgoing.out-airspace.topic=dnotam-events-airspace-topic
mp.messaging.outgoing.out-airspace.compression.type=lz4
mp.messaging.outgoing.out-airspace.acks=1
mp.messaging.outgoing.out-airspace.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-airspace.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-airspace.waitForWriteCompletion=false
mp.messaging.outgoing.out-airspace.tracing-enabled=true

mp.messaging.outgoing.out-hazards.connector=smallrye-kafka
mp.messaging.outgoing.out-hazards.topic=dnotam-events-hazards-navaids-topic
mp.messaging.outgoing.out-hazards.compression.type=lz4
mp.messaging.outgoing.out-hazards.acks=1
mp.messaging.outgoing.out-hazards.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-hazards.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-hazards.waitForWriteCompletion=false
mp.messaging.outgoing.out-hazards.tracing-enabled=true

mp.messaging.outgoing.out-unknown.connector=smallrye-kafka
mp.messaging.outgoing.out-unknown.topic=dnotam-events-others-topic
mp.messaging.outgoing.out-unknown.compression.type=lz4
mp.messaging.outgoing.out-unknown.acks=1
mp.messaging.outgoing.out-unknown.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-unknown.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-unknown.waitForWriteCompletion=false
mp.messaging.outgoing.out-unknown.tracing-enabled=true

mp.messaging.outgoing.out-dlq.connector=smallrye-kafka
mp.messaging.outgoing.out-dlq.topic=dnotam-events-dlq-topic
mp.messaging.outgoing.out-dlq.compression.type=lz4
mp.messaging.outgoing.out-dlq.acks=1
mp.messaging.outgoing.out-dlq.max-inflight-messages=${KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-dlq.buffer-size=${KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-dlq.waitForWriteCompletion=false
mp.messaging.outgoing.out-dlq.tracing-enabled=true

# =============================================================================
# Kafka Inbox Store (swim-inbox-store-kafka extension)
# Overrides the default topic from META-INF/microprofile-config.properties
# =============================================================================
mp.messaging.outgoing.swim-inbox.topic=${DNOTAM_INBOX_TOPIC:dnotam-inbox-topic}

# =============================================================================
# Kafka Inbox Consumer (Kafka -> full processing pipeline)
# =============================================================================
mp.messaging.incoming.in-dnotam-inbox.connector=smallrye-kafka
mp.messaging.incoming.in-dnotam-inbox.topic=${DNOTAM_INBOX_TOPIC:dnotam-inbox-topic}
mp.messaging.incoming.in-dnotam-inbox.group.id=${DNOTAM_INBOX_GROUP:dnotam-inbox-consumer}
mp.messaging.incoming.in-dnotam-inbox.batch=true
mp.messaging.incoming.in-dnotam-inbox.auto.offset.reset=earliest
mp.messaging.incoming.in-dnotam-inbox.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.in-dnotam-inbox.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.in-dnotam-inbox.failure-strategy=ignore
mp.messaging.incoming.in-dnotam-inbox.commit-strategy=throttled
mp.messaging.incoming.in-dnotam-inbox.auto.commit.interval.ms=${KAFKA_INBOX_COMMIT_INTERVAL:2000}
mp.messaging.incoming.in-dnotam-inbox.max.poll.records=${KAFKA_INBOX_MAX_POLL:500}
mp.messaging.incoming.in-dnotam-inbox.fetch.min.bytes=${KAFKA_INBOX_FETCH_MIN:1}
mp.messaging.incoming.in-dnotam-inbox.fetch.max.wait.ms=${KAFKA_INBOX_FETCH_MAX_WAIT:100}
mp.messaging.incoming.in-dnotam-inbox.concurrency=${KAFKA_INBOX_CONCURRENCY:20}
mp.messaging.incoming.in-dnotam-inbox.tracing-enabled=true

# =============================================================================
# Per-Subscription Heartbeat Monitor
# =============================================================================
swim.heartbeat.monitor.enabled=true
swim.heartbeat.monitor.check-interval=15s
swim.heartbeat.monitor.tolerance=30s

# =============================================================================
# SSL/TLS
# =============================================================================
quarkus.ssl.native=true

# =============================================================================
# REST Client - Subscription Manager (per-provider, configured via swim.providers)
# =============================================================================

quarkus.rest-client.logging.scope=none
quarkus.rest-client.logging.body-limit=0

# =============================================================================
# Fault Tolerance (Timeout + Retry)
# =============================================================================
swim.subscription.api.timeout=${SWIM_SUBSCRIPTION_API_TIMEOUT:30000}
swim.subscription.api.max-retries=${SWIM_SUBSCRIPTION_API_MAX_RETRIES:3}
swim.subscription.api.retry-delay=${SWIM_SUBSCRIPTION_API_RETRY_DELAY:1000}
swim.subscription.api.max-duration=${SWIM_SUBSCRIPTION_API_MAX_DURATION:120000}

# =============================================================================
# Schedulers
# =============================================================================
swim.scheduler.initial-delay=${SWIM_SCHEDULER_INITIAL_DELAY:30s}

# =============================================================================
# AMQP Batch (Kafka Inbox Staging)
# =============================================================================
swim.amqp.max-buffered-messages=${SWIM_AMQP_MAX_BUFFERED_MESSAGES:50}
swim.inbox.batch.size=${INBOX_BATCH_SIZE:50}
swim.inbox.batch.flush-interval-ms=${INBOX_BATCH_FLUSH_MS:50}

# =============================================================================
# Outbox Recovery & Cleanup
# =============================================================================
swim.outbox.recovery.interval=${SWIM_OUTBOX_RECOVERY_INTERVAL:30s}
swim.outbox.recovery.batch-size=${SWIM_OUTBOX_RECOVERY_BATCH_SIZE:100}
swim.outbox.cleanup.interval=${SWIM_OUTBOX_CLEANUP_INTERVAL:5m}
swim.outbox.cleanup.batch-size=${SWIM_OUTBOX_CLEANUP_BATCH_SIZE:500}
swim.outbox.max-retries=${SWIM_OUTBOX_MAX_RETRIES:5}

# =============================================================================
# Idempotency Cache
# =============================================================================
swim.idempotency.cache-name=processed-messages
quarkus.cache.caffeine."processed-messages".maximum-size=${SWIM_IDEMPOTENCY_CACHE_SIZE:100000}
quarkus.cache.caffeine."processed-messages".expire-after-write=${SWIM_IDEMPOTENCY_CACHE_TTL:24H}
quarkus.cache.caffeine."processed-messages".metrics-enabled=true

# =============================================================================
# OpenAPI / Swagger
# =============================================================================
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.management.enabled=false
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=SWIM DNOTAM Consumer API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Internal API for managing DNOTAM subscriptions and messages
mp.openapi.extensions.smallrye.info.contact.name=SWIM Developer Team

# =============================================================================
# Vert.x / Threading
# =============================================================================
quarkus.vertx.prefer-native-transport=true
quarkus.vertx.max-worker-execute-time=30s
quarkus.vertx.worker-pool-size=${VERTX_WORKER_POOL_SIZE:100}
quarkus.virtual-threads.enabled=false
quarkus.thread-pool.max-threads=${THREAD_POOL_MAX_THREADS:250}
quarkus.thread-pool.queue-size=1000
quarkus.banner.enabled=true

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
quarkus.log.category."com.github.swim_developer".level=INFO
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.category."org.apache.kafka".level=WARN
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c] (%t) %s%e%n
quarkus.log.console.async.enabled=true
quarkus.log.console.async.queue-length=10000
quarkus.log.console.async.overflow=DISCARD

# =============================================================================
# OpenTelemetry (Observability)
# =============================================================================
quarkus.otel.enabled=${OTEL_ENABLED:true}
quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.headers=${OTEL_HEADERS:}
quarkus.otel.resource.attributes=service.name=swim-dnotam-consumer,service.version=1.0.0,k8s.namespace.name=${POD_NAMESPACE:unknown}

# =============================================================================
# Prometheus Metrics
# =============================================================================
quarkus.management.enabled=true
quarkus.micrometer.enabled=${PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.enabled=${PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.path=/q/metrics

# =============================================================================
# Native Image Configuration
# =============================================================================
quarkus.index-dependency.aixm-model.group-id=com.github.swim-developer
quarkus.index-dependency.aixm-model.artifact-id=aixm-model
quarkus.native.resources.includes=schemas/**,com/sun/org/apache/xerces/internal/impl/msg/**,com/sun/org/apache/xerces/internal/impl/xpath/regex/**
quarkus.native.additional-build-args=-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.XMLSchemaMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.XMLMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.SAXMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.xpath.regex.message
