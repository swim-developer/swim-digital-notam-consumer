apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: swim-dnotam-consumer-hpa
  labels:
    app.kubernetes.io/name: swim-dnotam-consumer
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: swim-dnotam-consumer
  minReplicas: 1
  maxReplicas: 5
  metrics:
  # Only CPU-based scaling - memory is not a good indicator of load
  # Memory usage stays constant regardless of message throughput
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      # Wait 60s before scaling up to avoid oscillation
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleDown:
      # Wait 5 minutes before scaling down to ensure load is really gone
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
